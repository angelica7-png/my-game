<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンジェリカの宝石屋さん</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Cinzel+Decorative:wght@700;900&display=swap');

  :root {
    --bg-dark: #1a0030;
    --bg-mid: #2d0050;
    --purple: #6a0dad;
    --pink: #d966cc;
    --gold: #f0c040;
    --gem-glow: rgba(255,180,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Noto Serif JP', serif;
    overflow: hidden;
    position: relative;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(106,13,173,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(180,60,200,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(30,0,60,1) 0%, transparent 100%);
    z-index: 0;
  }

  #particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-20px) scale(1); opacity: 0; }
  }

  /* TITLE SCREEN */
  #title-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #3d006e 0%, #1a0030 70%);
  }

  #title-screen .title-img {
    width: min(380px, 90vw);
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(180,80,255,0.6), 0 0 120px rgba(180,80,255,0.2);
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { box-shadow: 0 0 60px rgba(180,80,255,0.6), 0 0 120px rgba(180,80,255,0.2); }
    50% { box-shadow: 0 0 80px rgba(220,120,255,0.9), 0 0 160px rgba(180,80,255,0.4); }
  }

  #start-btn {
    margin-top: 32px;
    padding: 16px 48px;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--bg-dark);
    background: linear-gradient(135deg, #f0c040, #e08020, #f0c040);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.1em;
    box-shadow: 0 0 30px rgba(240,192,64,0.6);
    animation: btnPulse 1.5s ease-in-out infinite;
    transition: transform 0.1s;
  }

  #start-btn:hover { transform: scale(1.05); }
  #start-btn:active { transform: scale(0.97); }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(240,192,64,0.6); }
    50% { box-shadow: 0 0 50px rgba(240,192,64,1), 0 0 80px rgba(240,192,64,0.4); }
  }

  /* GAME SCREEN */
  #game-screen {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px;
    display: none;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: min(440px, 98vw);
    margin-bottom: 10px;
  }

  .score-box, .time-box {
    background: rgba(80,0,120,0.7);
    border: 2px solid var(--pink);
    border-radius: 12px;
    padding: 8px 20px;
    color: var(--gold);
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    min-width: 110px;
    box-shadow: 0 0 12px rgba(217,102,204,0.4);
  }

  .score-box span, .time-box span {
    display: block;
    font-size: 0.7rem;
    color: var(--pink);
    letter-spacing: 0.1em;
  }

  .small-title-img {
    width: 60px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(180,80,255,0.5);
  }

  /* GRID */
  #grid-container {
    position: relative;
    background: rgba(30,0,60,0.85);
    border: 3px solid var(--purple);
    border-radius: 16px;
    padding: 10px;
    box-shadow: 0 0 40px rgba(106,13,173,0.5), inset 0 0 20px rgba(106,13,173,0.2);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cell {
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, filter 0.15s;
    position: relative;
    font-size: 28px;
    user-select: none;
    background: rgba(60,0,100,0.4);
    border: 1px solid rgba(180,80,255,0.2);
  }

  .cell:hover { transform: scale(1.1); filter: brightness(1.3); }
  .cell.selected {
    background: rgba(240,192,64,0.25);
    border: 2px solid var(--gold);
    box-shadow: 0 0 15px rgba(240,192,64,0.6);
    transform: scale(1.12);
  }

  .cell.matched {
    animation: matchExplode 0.4s ease-out forwards;
  }

  @keyframes matchExplode {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.8; filter: brightness(3); }
    100% { transform: scale(0); opacity: 0; }
  }

  .cell.swap-anim {
    animation: swapBounce 0.25s ease-in-out;
  }

  @keyframes swapBounce {
    0% { transform: scale(1); }
    50% { transform: scale(0.8); }
    100% { transform: scale(1); }
  }

  /* Messages */
  #message {
    margin-top: 10px;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(240,192,64,0.8);
    letter-spacing: 0.15em;
    min-height: 2rem;
    animation: msgPop 0.3s ease-out;
  }

  @keyframes msgPop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Combo display */
  #combo {
    font-size: 2.2rem;
    font-weight: 900;
    color: #ff88ff;
    text-shadow: 0 0 25px rgba(255,136,255,0.9);
    min-height: 2.5rem;
    letter-spacing: 0.1em;
  }

  /* Instruction */
  .instruction {
    margin-top: 8px;
    color: rgba(200,140,255,0.8);
    font-size: 0.85rem;
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* Game Over Screen */
  #gameover-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,0,25,0.92);
    backdrop-filter: blur(8px);
  }

  #gameover-screen h2 {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 2.5rem;
    text-shadow: 0 0 30px rgba(240,192,64,0.8);
    margin-bottom: 20px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  .final-score {
    color: #ff88ff;
    font-size: 1.8rem;
    font-weight: 900;
    margin-bottom: 30px;
    text-shadow: 0 0 20px rgba(255,136,255,0.6);
  }

  #retry-btn {
    padding: 14px 40px;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--bg-dark);
    background: linear-gradient(135deg, #f0c040, #e08020, #f0c040);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(240,192,64,0.6);
    transition: transform 0.1s;
  }
  #retry-btn:hover { transform: scale(1.05); }

  /* Hearts floating */
  .heart-float {
    position: fixed;
    font-size: 1.5rem;
    pointer-events: none;
    z-index: 50;
    animation: heartRise 1.2s ease-out forwards;
  }

  @keyframes heartRise {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
  }

  .score-float {
    position: fixed;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold);
    pointer-events: none;
    z-index: 50;
    text-shadow: 0 0 10px rgba(240,192,64,0.8);
    animation: scoreRise 1s ease-out forwards;
  }

  @keyframes scoreRise {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    100% { transform: translateY(-80px) scale(1.2); opacity: 0; }
  }

  /* Time extend banner */
  .time-extend {
    position: fixed;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Noto Serif JP', serif;
    font-size: 2rem;
    font-weight: 900;
    color: #66ffcc;
    background: rgba(20,0,50,0.85);
    border: 3px solid #66ffcc;
    border-radius: 16px;
    padding: 16px 36px;
    z-index: 150;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(102,255,204,0.9);
    box-shadow: 0 0 40px rgba(102,255,204,0.6);
    animation: extendPop 1.8s ease-out forwards;
    white-space: nowrap;
  }

  @keyframes extendPop {
    0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
    15% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    30% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    80% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-60%) scale(1); opacity: 0; }
  }

  /* Gem legend */
  .gem-legend {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .gem-legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.75rem;
    color: rgba(200,160,255,0.9);
  }
</style>
</head>
<body>

<div id="particles"></div>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <img class="title-img" id="title-img-el" src="" alt="アンジェリカの宝石屋さん">
  <button id="start-btn" onclick="startGame()">✨ ゲームスタート ✨</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="game-header">
    <div class="score-box"><span>スコア</span><span id="score-disp">0</span></div>
    <img class="small-title-img" id="small-img-el" src="" alt="">
    <div class="time-box"><span>のこり時間</span><span id="time-disp">60</span></div>
  </div>
  <div id="combo"></div>
  <div id="grid-container">
    <div id="grid"></div>
  </div>
  <div id="message"></div>
  <div class="instruction">💎 宝石をタップして選択 → 隣（上下左右）をタップで入れ替え<br>同じ宝石を3つ以上並べると消えます！</div>
  <div class="gem-legend">
    <div class="gem-legend-item">💎 ダイヤ</div>
    <div class="gem-legend-item">❤️ ルビー</div>
    <div class="gem-legend-item">💙 サファイア</div>
    <div class="gem-legend-item">💚 エメラルド</div>
    <div class="gem-legend-item">💛 トパーズ</div>
    <div class="gem-legend-item">💜 アメジスト</div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover-screen">
  <h2>Game Over</h2>
  <div class="final-score" id="final-score-disp">スコア: 0</div>
  <button id="retry-btn" onclick="retryGame()">🔮 もう一度遊ぶ</button>
</div>

// Game constants
const COLS = 7;
const ROWS = 8;
const GEMS = ['💎','❤️','💙','💚','💛','💜'];
const GEM_NAMES = ['ダイヤ','ルビー','サファイア','エメラルド','トパーズ','アメジスト'];
const GAME_TIME = 60;

let grid = [];
let selected = null;
let score = 0;
let timeLeft = GAME_TIME;
let timer = null;
let combo = 0;
let isAnimating = false;
let nextExtendScore = 1500; // 得点がこれを超えるたびに5秒延長

// Particles
function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#d966cc','#9933ff','#6644ff','#ff99ff','#ffaaff'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*8+5}s;
      animation-delay:${Math.random()*8}s;
    `;
    container.appendChild(p);
  }
}

function randomGem() {
  return GEMS[Math.floor(Math.random() * GEMS.length)];
}

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = randomGem();
    }
  }
  // Ensure no initial matches
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let attempts = 0;
      while (hasMatchAt(r, c) && attempts < 20) {
        grid[r][c] = randomGem();
        attempts++;
      }
    }
  }
}

function hasMatchAt(r, c) {
  const g = grid[r][c];
  // Horizontal
  if (c >= 2 && grid[r][c-1] === g && grid[r][c-2] === g) return true;
  // Vertical
  if (r >= 2 && grid[r-1][c] === g && grid[r-2][c] === g) return true;
  return false;
}

function renderGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = grid[r][c] || '';
      cell.dataset.r = r;
      cell.dataset.c = c;
      if (!grid[r][c]) cell.style.visibility = 'hidden';
      cell.addEventListener('click', () => onCellClick(r, c));
      if (selected && selected.r === r && selected.c === c) {
        cell.classList.add('selected');
      }
      gridEl.appendChild(cell);
    }
  }
}

function onCellClick(r, c) {
  if (isAnimating) return;
  if (!grid[r][c]) return;

  if (!selected) {
    selected = { r, c };
    renderGrid();
    return;
  }

  if (selected.r === r && selected.c === c) {
    selected = null;
    renderGrid();
    return;
  }

  // Allow adjacent swap (up/down/left/right)
  const dr = Math.abs(r - selected.r);
  const dc = Math.abs(c - selected.c);

  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    // Adjacent swap (vertical or horizontal)
    doSwap(selected.r, selected.c, r, c);
    selected = null;
  } else {
    // Not adjacent — move selection
    selected = { r, c };
    renderGrid();
  }
}

function doSwap(r1, c1, r2, c2) {
  isAnimating = true;
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;

  renderGrid();

  // Animate swap cells
  const cells = document.querySelectorAll('.cell');
  const idx1 = r1 * COLS + c1;
  const idx2 = r2 * COLS + c2;
  cells[idx1].classList.add('swap-anim');
  cells[idx2].classList.add('swap-anim');

  setTimeout(() => {
    const matched = findMatches();
    if (matched.length === 0) {
      // Swap back
      const tmp2 = grid[r1][c1];
      grid[r1][c1] = grid[r2][c2];
      grid[r2][c2] = tmp2;
      combo = 0;
      showMessage('マッチしない！', 800);
      renderGrid();
      isAnimating = false;
    } else {
      combo = 0;
      processMatches();
    }
  }, 280);
}

function findMatches() {
  const matched = new Set();

  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 3; c++) {
      const g = grid[r][c];
      if (g && g === grid[r][c+1] && g === grid[r][c+2]) {
        matched.add(`${r},${c}`);
        matched.add(`${r},${c+1}`);
        matched.add(`${r},${c+2}`);
        // Extend
        let k = c+3;
        while (k < COLS && grid[r][k] === g) { matched.add(`${r},${k}`); k++; }
      }
    }
  }

  // Vertical
  for (let r = 0; r <= ROWS - 3; r++) {
    for (let c = 0; c < COLS; c++) {
      const g = grid[r][c];
      if (g && g === grid[r+1][c] && g === grid[r+2][c]) {
        matched.add(`${r},${c}`);
        matched.add(`${r+1},${c}`);
        matched.add(`${r+2},${c}`);
        let k = r+3;
        while (k < ROWS && grid[k][c] === g) { matched.add(`${k},${c}`); k++; }
      }
    }
  }

  return [...matched].map(s => {
    const [r, c] = s.split(',').map(Number);
    return { r, c };
  });
}

function processMatches() {
  const matched = findMatches();
  if (matched.length === 0) {
    combo = 0;
    fillGrid();
    isAnimating = false;
    return;
  }

  combo++;
  // Higher-value scoring: base 50 per gem, length bonus, amplified combo multiplier
  const lengthBonus = matched.length >= 5 ? 500 : (matched.length >= 4 ? 200 : 0);
  const pts = (matched.length * 50 * combo) + lengthBonus;
  score += pts;
  document.getElementById('score-disp').textContent = score;

  // 1500点を超えるたびに5秒延長（3000, 4500...も対応）
  while (score >= nextExtendScore) {
    timeLeft += 5;
    nextExtendScore += 1500;
    document.getElementById('time-disp').textContent = timeLeft;
    document.getElementById('time-disp').style.color = '';
    showTimeExtend();
    Music.playExtend();
  }

  if (combo > 1) {
    document.getElementById('combo').textContent = `🔥 COMBO x${combo}!`;
    setTimeout(() => { document.getElementById('combo').textContent = ''; }, 1500);
  }

  const messages = ['キラキラ✨','すごい！💎','輝く！🌟','マジカル！🪄','ブリリアント！💫'];
  showMessage(messages[Math.floor(Math.random() * messages.length)]);
  Music.playMatch(combo);

  // Animate matched cells
  const cells = document.querySelectorAll('.cell');
  matched.forEach(({ r, c }) => {
    const idx = r * COLS + c;
    cells[idx].classList.add('matched');

    // Float score at position
    const rect = cells[idx].getBoundingClientRect();
    floatScore(`+${pts}`, rect.left + rect.width/2, rect.top + rect.top/2);
    floatHeart(rect.left + rect.width/2, rect.top);
  });

  setTimeout(() => {
    matched.forEach(({ r, c }) => { grid[r][c] = null; });
    dropGems();
    setTimeout(() => {
      fillEmpty();
      renderGrid();
      setTimeout(() => processMatches(), 200);
    }, 300);
  }, 400);
}

function dropGems() {
  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== null) {
        grid[empty][c] = grid[r][c];
        if (empty !== r) grid[r][c] = null;
        empty--;
      }
    }
  }
}

function fillEmpty() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === null) {
        grid[r][c] = randomGem();
      }
    }
  }
}

function fillGrid() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!grid[r][c]) grid[r][c] = randomGem();
    }
  }
  renderGrid();
}

function showMessage(msg, duration = 1200) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'msgPop 0.3s ease-out';
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, duration);
}

function showTimeExtend() {
  const el = document.createElement('div');
  el.className = 'time-extend';
  el.textContent = '⏰ +5秒 タイム延長！';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

function floatHeart(x, y) {
  const hearts = ['💖','💗','💕','✨','⭐'];
  const el = document.createElement('div');
  el.className = 'heart-float';
  el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  el.style.left = (x - 10) + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function floatScore(text, x, y) {
  const el = document.createElement('div');
  el.className = 'score-float';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  Music.stop();
  Music.startGameTheme();
  score = 0;
  timeLeft = GAME_TIME;
  combo = 0;
  selected = null;
  isAnimating = false;
  nextExtendScore = 1500;
  document.getElementById('score-disp').textContent = '0';
  document.getElementById('time-disp').textContent = GAME_TIME;
  document.getElementById('time-disp').style.color = '';
  document.getElementById('message').textContent = '';
  document.getElementById('combo').textContent = '';
  initGrid();
  renderGrid();

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById('time-disp').textContent = timeLeft;
    if (timeLeft <= 10) {
      document.getElementById('time-disp').style.color = '#ff4444';
    }
    if (timeLeft <= 0) {
      clearInterval(timer);
      endGame();
    }
  }, 1000);
}

function endGame() {
  Music.stop();
  Music.playGameOver();
  document.getElementById('gameover-screen').style.display = 'flex';
  document.getElementById('final-score-disp').textContent = `スコア: ${score}`;
}

function retryGame() {
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('time-disp').style.color = '';
  clearInterval(timer);
  startGame();
}

// Init
createParticles();

// ===== Claude-generated music engine (Web Audio API) =====
const Music = (() => {
  let ctx = null;
  let masterGain = null;
  let currentLoop = null;   // {id} for cancelling scheduled notes
  let playing = false;
  let scheduledTimers = [];

  function ensureCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.35;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }

  // Play a single note with a soft synth voice
  function note(freq, start, dur, type = 'triangle', vol = 0.5) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    // gentle ADSR
    const t = ctx.currentTime + start;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.02);
    g.gain.linearRampToValueAtTime(vol * 0.7, t + dur * 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t);
    osc.stop(t + dur + 0.05);
  }

  // Note frequencies (just intonation-ish, A minor / pentatonic feel — magical)
  const N = {
    A3:220.00, B3:246.94, C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00,
    A4:440.00, B4:493.88, C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99,
    A5:880.00, C6:1046.50, E6:1318.51
  };

  // ----- TITLE THEME: gentle, mysterious, magical waltz -----
  function startTitleTheme() {
    ensureCtx();
    playing = true;
    const tempo = 0.42; // seconds per beat
    // melody (pitch, beats) — dreamy minor melody
    const melody = [
      ['A4',1],['C5',1],['E5',1],['D5',0.5],['C5',0.5],
      ['B4',1.5],['A4',0.5],['G4',1],['E4',1],
      ['A4',1],['E5',1],['C5',1],['D5',1],
      ['E5',2],['rest',1],['rest',1],
      ['F5',1],['E5',1],['D5',1],['C5',0.5],['B4',0.5],
      ['A4',1.5],['B4',0.5],['C5',1],['E5',1],
      ['D5',1],['C5',1],['B4',1],['A4',1],
      ['A4',2],['rest',1],['rest',1],
    ];
    // simple bass arpeggio under it
    const bass = ['A3','E4','A3','C4'];

    function loop() {
      if (!playing) return;
      let t = 0;
      let beatIdx = 0;
      melody.forEach(([p, b]) => {
        if (p !== 'rest') note(N[p], t * tempo, b * tempo * 0.9, 'triangle', 0.32);
        // bass on each beat
        const beatsInThis = Math.max(1, Math.round(b));
        for (let k = 0; k < beatsInThis; k++) {
          const bf = N[bass[beatIdx % bass.length]];
          note(bf, (t + k) * tempo, tempo * 0.85, 'sine', 0.22);
          beatIdx++;
        }
        t += b;
      });
      const totalSec = t * tempo;
      const timer = setTimeout(loop, totalSec * 1000);
      scheduledTimers.push(timer);
    }
    loop();
  }

  // ----- GAME THEME: bouncier, upbeat magical tune -----
  function startGameTheme() {
    ensureCtx();
    playing = true;
    const tempo = 0.30;
    const melody = [
      ['E5',0.5],['A5',0.5],['G5',0.5],['E5',0.5],['D5',0.5],['E5',0.5],['C5',1],
      ['D5',0.5],['E5',0.5],['F5',0.5],['E5',0.5],['D5',1],['B4',1],
      ['C5',0.5],['E5',0.5],['A5',0.5],['G5',0.5],['E5',1],['D5',1],
      ['C5',0.5],['D5',0.5],['E5',1],['A4',1],['rest',1],
      ['A5',0.5],['G5',0.5],['E5',0.5],['D5',0.5],['C5',0.5],['D5',0.5],['E5',1],
      ['G5',0.5],['F5',0.5],['E5',0.5],['D5',0.5],['C5',1],['A4',1],
    ];
    const bassPattern = ['A3','A3','E4','E4','F4','F4','G4','G4'];

    function loop() {
      if (!playing) return;
      let t = 0;
      let beatIdx = 0;
      melody.forEach(([p, b]) => {
        if (p !== 'rest') note(N[p], t * tempo, b * tempo * 0.85, 'square', 0.18);
        const beatsInThis = Math.max(1, Math.round(b / 0.5));
        for (let k = 0; k < beatsInThis; k++) {
          const bf = N[bassPattern[beatIdx % bassPattern.length]];
          note(bf, (t + k * 0.5) * tempo, tempo * 0.45, 'sine', 0.25);
          beatIdx++;
        }
        t += b;
      });
      const totalSec = t * tempo;
      const timer = setTimeout(loop, totalSec * 1000);
      scheduledTimers.push(timer);
    }
    loop();
  }

  // ----- SFX -----
  function playMatch(comboLevel = 1) {
    ensureCtx();
    const base = 660 + comboLevel * 80;
    note(base, 0, 0.12, 'triangle', 0.4);
    note(base * 1.25, 0.06, 0.12, 'triangle', 0.35);
    note(base * 1.5, 0.12, 0.18, 'triangle', 0.3);
  }

  function playExtend() {
    ensureCtx();
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
      note(f, i * 0.08, 0.25, 'triangle', 0.35);
    });
  }

  function playGameOver() {
    ensureCtx();
    [523.25, 440, 349.23, 261.63].forEach((f, i) => {
      note(f, i * 0.22, 0.4, 'triangle', 0.35);
    });
  }

  function stop() {
    playing = false;
    scheduledTimers.forEach(t => clearTimeout(t));
    scheduledTimers = [];
  }

  return {
    startTitleTheme, startGameTheme,
    playMatch, playExtend, playGameOver,
    stop, ensureCtx
  };
})();

// Title theme — start on first user interaction (autoplay policy)
function tryStartTitleMusic() {
  if (document.getElementById('title-screen').style.display !== 'none') {
    Music.stop();
    Music.startTitleTheme();
  }
}
document.addEventListener('click', tryStartTitleMusic, { once: true });
document.addEventListener('touchstart', tryStartTitleMusic, { once: true });
</script>
</body>
